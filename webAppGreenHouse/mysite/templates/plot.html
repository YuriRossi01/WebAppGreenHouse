<body>

<div class="navbar">

    <a class="subnav" href="../home">Home</a>

    <div class="subnav">
        <button class="subnavbtn">Previsioni <i class="fa fa-caret-down"></i></button>
        <div class="subnav-content">

        </div>
    </div>

    <a class="subnav" href="../plot">Grafici</a>


    <a class="subnav" href="../autori">Autori</a>


</div>

<div class="areaTitolo">
    <h1>Grafici prestazioni modelli</h1>
    <label>Scegli un sensore:</label>
    <select onchange="changeGrafici()" name="sensore" id="selectSensore">
        <option value="1">Sensore 1</option>
        <option value="2">Sensore 2</option>
        <option value="3">Sensore 3</option>
        <option value="4">Sensore 4</option>
    </select>
</div>
<div class="areaGrafici">
    <h3 class="graficoLSTM">Grafico modello LSTM</h3>
    <img class="graficoLSTM" id="im1" src="{% static 'modelliKeras/modelliLSTM/LSTM_model_2loss.png' %}"/>

    <h3 class="graficoLSTMCNN">Grafico modello LSTM->CNN</h3>
    <img class="graficoLSTMCNN" id="im2" src="{% static 'modelliKeras/modelliLSTMCNN/LSTM_CNN_model_1loss.png' %}"/>



    <h3 class="graficoCNNLSTM">Grafico modello CNN->LSTM</h3>
    <img class="graficoCNNLSTM" id="im3" src="{% static 'modelliKeras/modelliCNNLSTM/CNN_LSTM_model_1loss.png' %}"/>

    <h3 class="graficoLSTMCNNPar">Grafico modello LSTM CNN paralleli</h3>
    <img class="graficoLSTMCNNPar" id="im4" src="{% static 'modelliKeras/modelliCNNLSTMPar/CNN_LSTM_PAR_model_1/mapeGraph.png' %}"/>






</div>


</body>
<script>
    function changeGrafici() {
        nomeFile="LSTM_model_"
        d = document.getElementById("selectSensore").value;

        nomeFile=nomeFile+d+"loss.png";
        document.getElementById("im1").src="/static/images/"+nomeFile;
        document.getElementById("im2").src="/static/images/"+nomeFile;
        document.getElementById("im3").src="/static/images/"+nomeFile;
        document.getElementById("im4").src="/static/images/"+nomeFile;
    }
</script>
</html>
